<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Amachi! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Howler for Audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- Main Game Container -->
    <div id="game-container">

        <!-- Scene 1: Loading Screen -->
        <div id="loading-screen" class="scene active">
            <div class="terminal-text" id="loading-text"></div>
            <div id="start-btn" class="hidden">Click to Start</div>
        </div>

        <!-- Main Visual Novel Interface -->
        <div id="vn-screen" class="scene">
            <!-- Collage Layer -->
            <div id="collage-container">
                <!-- Collage Images -->
                <div class="polaroid p1"><img src="images/collage/1710954743279.jpg" alt="Photo 1"></div>
                <div class="polaroid p2"><img src="images/collage/1710954743315.jpg" alt="Photo 2"></div>
                <div class="polaroid p3"><img src="images/collage/IMG_20260227_192411.jpg" alt="Photo 3"></div>
                <div class="polaroid p4"><img src="images/collage/IMG_20260227_192451.jpg" alt="Photo 4"></div>
            </div>

            <!-- Sprite Container -->
            <div id="sprite-container">
                <img id="cherin-sprite" class="sprite cherin" src="Cherin_Sprites/Cherin_neutral.png" alt="Cherin">
                <img id="amachi-sprite" class="sprite amachi" src="Amachi_Sprites/amachi_blush.png" alt="Amachi">
            </div>

            <!-- Final Birthday Overlay -->
            <div id="final-screen" class="hidden">
                <h1 class="glow-text">HAPPY BIRTHDAY AMACHIIIIIIIIII ❤️</h1>
                <div id="replay-btn">Replay Story</div>
            </div>

            <!-- Dialogue System -->
            <div id="dialogue-box">
                <div id="speaker-name">Cherin</div>
                <div id="dialogue-text"></div>
                <!-- Cute next indicator -->
                <div id="next-indicator" class="hidden">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
